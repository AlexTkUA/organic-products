<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Yellowtail&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles/main.css" />
  </head>
  <body>
    <main class="main">
      <section class="banner">
        <!-- Тут рендериться через js -->
      </section>
      <section class="shop">

          <div class="shop_titleBlock">
            <span class="italicSuperTitle text-center">Categories</span>
            <h2 class="shop_titleBlock_title">Our Products</h2>
          </div>
          <div class="shop_category-list">
            <!-- Тут рендериться через js -->
          </div>
          <h3 class = "shop_category_title">All</h3>
          <div class="shop_list shop_list-page">
            <div data-loader></div>
            <!-- Тут рендериться через js -->
          </div>
          <div class="pagination">
            <!-- Тут рендериться через js -->
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="../../js/main.js"></script>
  </body>
</html>
